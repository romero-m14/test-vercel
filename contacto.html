<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">LuxuryStay</div>
            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="favorito.html">Tu Hotel Favorito</a></li>
                <li><a href="contacto.html" class="active">Contáctanos</a></li>
            </ul>
        </nav>
    </header>

    <main class="section bg-light">
        <h2>Contáctanos</h2>
        <div class="contact-wrapper">
            <form class="contact-form">
                <input type="text" placeholder="Nombre completo" required>
                <input type="email" placeholder="Correo electrónico" required>
                <textarea placeholder="¿En qué podemos ayudarte?" rows="5"></textarea>
                <button type="submit" class="btn">Enviar Mensaje</button>
            </form>
        </div>
    </main>

    <footer>
        <p>Tu hotel a mejor precio</p>
    </footer>
</body>
</html>
